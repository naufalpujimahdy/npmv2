version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-portfolio_db}
      MYSQL_USER: ${DB_USER:-portfolio_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-portfolio_pass123}
      TZ: "UTC"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # Backend (API Server)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER:-portfolio_user}:${DB_PASSWORD:-portfolio_pass123}@db:3306/${DB_NAME:-portfolio_db}
      NEXT_PUBLIC_API_URL: https://naufalpujimahdy.id/api
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - portfolio-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      timeout: 10s
      retries: 5
      interval: 30s

  # Frontend (Web Application)
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://naufalpujimahdy.id/api
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - portfolio-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3001",
        ]
      timeout: 10s
      retries: 5
      interval: 30s

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - portfolio-network
    depends_on:
      - frontend
      - backend
    environment:
      DOMAIN: ${DOMAIN:-naufalpujimahdy.id}

volumes:
  db_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  portfolio-network:
    driver: bridge
